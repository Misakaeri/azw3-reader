<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c5f8a"/>
      <stop offset="50%" stop-color="#1e4a70"/>
      <stop offset="100%" stop-color="#163a5a"/>
    </linearGradient>
    <!-- 书本左侧渐变 -->
    <linearGradient id="bookLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <!-- 书本右侧渐变 -->
    <linearGradient id="bookRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0ece4"/>
    </linearGradient>
    <!-- 书封渐变 -->
    <linearGradient id="coverGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a838"/>
      <stop offset="100%" stop-color="#d4922a"/>
    </linearGradient>
    <!-- 书脊阴影 -->
    <linearGradient id="spineShade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(0,0,0,0.08)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
    <!-- 投影 -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <!-- 背景圆形高光 -->
    <radialGradient id="highlight" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- 书页纹理线条 -->
    <pattern id="lines" patternUnits="userSpaceOnUse" width="120" height="6">
      <line x1="0" y1="3" x2="120" y2="3" stroke="rgba(0,0,0,0.04)" stroke-width="0.8"/>
    </pattern>
  </defs>

  <!-- === 背景圆角方块 === -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="url(#bgGrad)" filter="url(#shadow)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="url(#highlight)"/>

  <!-- === 书本主体 === -->
  <g transform="translate(256, 256)">
    <!-- 书本投影 -->
    <ellipse cx="0" cy="118" rx="140" ry="16" fill="rgba(0,0,0,0.15)" filter="url(#dropShadow)"/>

    <!-- 左侧书页（底部堆叠） -->
    <path d="M-8,-80 L-130,40 L-130,90 L-8,10 Z" fill="#d8d0c0" opacity="0.4"/>
    <path d="M-6,-78 L-128,42 L-128,88 L-6,12 Z" fill="#e0d8c8" opacity="0.5"/>

    <!-- 左侧书页 -->
    <path d="M-4,-76 L-126,44 L-126,86 L-4,14 Z" fill="url(#bookLeft)"/>

    <!-- 右侧书页（底部堆叠） -->
    <path d="M8,-80 L130,40 L130,90 L8,10 Z" fill="#d8d0c0" opacity="0.4"/>
    <path d="M6,-78 L128,42 L128,88 L6,12 Z" fill="#e0d8c8" opacity="0.5"/>

    <!-- 右侧书页 -->
    <path d="M4,-76 L126,44 L126,86 L4,14 Z" fill="url(#bookRight)"/>

    <!-- 书脊阴影 -->
    <path d="M-4,-76 L4,-76 L4,14 L-4,14 Z" fill="url(#spineShade)"/>

    <!-- 书页线条 - 左侧 -->
    <line x1="-8" y1="-56" x2="-110" y2="50" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="-8" y1="-36" x2="-110" y2="58" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="-8" y1="-16" x2="-110" y2="66" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="-8" y1="4" x2="-110" y2="74" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>

    <!-- 书页线条 - 右侧 -->
    <line x1="8" y1="-56" x2="110" y2="50" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="8" y1="-36" x2="110" y2="58" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="8" y1="-16" x2="110" y2="66" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>
    <line x1="8" y1="4" x2="110" y2="74" stroke="rgba(0,0,0,0.05)" stroke-width="1"/>

    <!-- 书签（丝带） -->
    <path d="M-4,-76 L-4,-110 L12,-98 L28,-110 L28,-84 L12,-72 Z"
          fill="url(#coverGrad)" filter="url(#dropShadow)"/>
    <path d="M-4,-76 L-4,-110 L12,-98 L28,-110 L28,-84 L12,-72 Z"
          fill="none" stroke="#c47e20" stroke-width="0.5"/>

    <!-- 左侧书页上的文字（装饰性） -->
    <text x="-72" y="38" font-family="Georgia, serif" font-size="10"
          fill="#b0a898" text-anchor="middle" opacity="0.6">
      ———
    </text>
    <text x="-72" y="52" font-family="Georgia, serif" font-size="10"
          fill="#b0a898" text-anchor="middle" opacity="0.6">
      ———
    </text>

    <!-- 右侧书页上的文字（装饰性） -->
    <text x="72" y="38" font-family="Georgia, serif" font-size="10"
          fill="#b0a898" text-anchor="middle" opacity="0.6">
      ———
    </text>
    <text x="72" y="52" font-family="Georgia, serif" font-size="10"
          fill="#b0a898" text-anchor="middle" opacity="0.6">
      ———
    </text>
  </g>
</svg>
